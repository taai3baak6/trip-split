<body>
<div class="app" id="app">
  <div class="loading" id="loading">Loading your trips...</div>
</div>
<footer class="credit"><span class="credit-name">太白</span><span class="credit-dot">•</span><span class="credit-handle">taai3baak6</span></footer>

<!-- Only used for the optional "Export to Excel" button. deferred so it never blocks the app
     from loading when offline — everything else in this file works with zero internet access. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

<script>
(function(){

const CATEGORY_COLORS = ['#C9A227','#1B2138','#8A5A44','#4C7A67','#7E6A9C','#B3453D','#5B7A8C','#3E6E8C'];
const DEFAULT_CATEGORIES = ['Food','Transport','Accommodation','Shopping','Activities','Other'];
const DEFAULT_PAYMENT_METHODS = ['Cash','Card'];

let state = {
  projects: [],
  currentProjectId: null,
  currentProject: null,
  activeTab: 'add',
  editingExpenseId: null,
  formError: '',
  draft: null,
  joinError: '',
  expenseFilters: { date:'', category:'', payerId:'', status:'' },
  summaryFilters: { date:'', category:'' }
};

async function safeGet(key){
  try{ const v = localStorage.getItem(key); return v!==null ? JSON.parse(v) : null; }
  catch(e){ return null; }
}
async function safeSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch(e){ return false; }
}
async function safeDelete(key){ try{ localStorage.removeItem(key); }catch(e){} }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmt(n){
  n = Math.round((n + Number.EPSILON)*100)/100;
  return n.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
}
function initials(name){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function curSym(){ return (state.currentProject && state.currentProject.currency) || '₩'; }
function homeSym(){ return (state.currentProject && state.currentProject.homeCurrency) || ''; }
function sameCurrency(p){ return !!p.homeCurrency && p.currency.trim() === p.homeCurrency.trim(); }
function needsConversion(p){ return !!p.homeCurrency && !sameCurrency(p); }

function normalizeProject(p){
  p.name = p.name || 'Untitled trip';
  p.currency = p.currency || '₩';
  p.homeCurrency = (p.homeCurrency !== undefined) ? p.homeCurrency : 'HK$';
  p.categories = p.categories && p.categories.length ? p.categories : DEFAULT_CATEGORIES.slice();
  p.paymentMethods = p.paymentMethods && p.paymentMethods.length ? p.paymentMethods : DEFAULT_PAYMENT_METHODS.slice();
  p.exchangeRates = (p.exchangeRates || []).map(r => ({
    ...r,
    paymentMethod: r.paymentMethod === 'cash' ? 'Cash' : (r.paymentMethod === 'card' ? 'Card' : r.paymentMethod)
  }));
  p.members = p.members || [];
  p.expenses = (p.expenses || []).map(e=>{
    const ne = Object.assign({}, e);
    if(!Array.isArray(ne.adjustments)){
      ne.adjustments = (ne.adjustmentType && ne.adjustmentType!=='none' && ne.adjustmentPercent)
        ? [{ id: uid(), sign: ne.adjustmentType==='taxfree' ? '-' : '+', percent: ne.adjustmentPercent, label: ne.adjustmentType==='taxfree' ? 'Tax-free' : 'Service charge' }]
        : [];
    }
    delete ne.adjustmentType;
    delete ne.adjustmentPercent;
    if(ne.paymentMethod === undefined) ne.paymentMethod = 'Cash';
    if(ne.paymentMethod === 'cash') ne.paymentMethod = 'Cash';
    if(ne.paymentMethod === 'card') ne.paymentMethod = 'Card';
    const shares = {};
    Object.entries(ne.shares || {}).forEach(([mid, v])=>{
      if(typeof v === 'number'){ shares[mid] = {amount: v, settled: false}; }
      else { shares[mid] = {amount: v.amount||0, settled: !!v.settled}; }
    });
    ne.shares = shares;
    if(ne.splitType === 'items' && !Array.isArray(ne.items)) ne.items = [];
    delete ne.subtotal;
    delete ne.baseShares;
    return ne;
  });
  return p;
}

async function loadProjects(){ state.projects = (await safeGet('projects', false)) || []; }
async function saveProjects(){ await safeSet('projects', state.projects, false); }

async function loadProject(id){
  const data = await safeGet('project:'+id, true);
  if(data){
    state.currentProject = normalizeProject(data);
  } else {
    state.currentProject = null;
  }
  state.currentProjectId = id;
  state.expenseFilters = { date:'', category:'', payerId:'', status:'' };
  state.summaryFilters = { date:'', category:'' };
}
async function saveCurrentProject(){
  if(state.currentProjectId) await safeSet('project:'+state.currentProjectId, state.currentProject, true);
}

async function createProject(name){
  const id = uid();
  const project = normalizeProject({ id, name, members: [], expenses: [], createdAt: Date.now() });
  state.currentProject = project;
  state.currentProjectId = id;
  await saveCurrentProject();
  state.projects.push({id, name});
  await saveProjects();
  state.activeTab = 'members';
  render();
}

async function deleteProjectPermanently(id){
  await safeDelete('project:'+id);
  state.projects = state.projects.filter(p=>p.id!==id);
  await saveProjects();
  if(state.currentProjectId === id){
    state.currentProjectId = null; state.currentProject = null;
    if(state.projects.length) await loadProject(state.projects[0].id);
  }
  render();
}

function freshDraft(){
  const included = {};
  state.currentProject.members.forEach(m=> included[m.id] = true);
  return {
    dateMode: 'auto',
    date: todayStr(),
    item: '',
    category: (state.currentProject.categories[0]) || 'Other',
    total: '',
    adjustments: [],
    payerId: (state.currentProject.members[0] && state.currentProject.members[0].id) || '',
    paymentMethod: (state.currentProject.paymentMethods[0]) || 'Cash',
    splitType: 'equal',
    includedMembers: included,
    customShares: {},
    items: []
  };
}

// Adjustments (service charge, tax, discount, etc.) apply in the order listed, compounding —
// e.g. +10% then +5% is total*(1.10)*(1.05). Sign is '+' (surcharge) or '-' (discount).
function multiplierForAdjustments(adjustments){
  return (adjustments||[]).reduce((m,a)=>{
    const p = parseFloat(a.percent)||0;
    return m * (a.sign==='-' ? (1 - p/100) : (1 + p/100));
  }, 1);
}

function draftFromExpense(e){
  const customShares = {};
  const included = {};
  const multiplier = multiplierForAdjustments(e.adjustments);
  (state.currentProject.members||[]).forEach(m=>{ included[m.id] = false; });
  Object.entries(e.shares||{}).forEach(([mid,info])=>{
    customShares[mid] = multiplier !== 1 ? Math.round((info.amount/multiplier + Number.EPSILON)*100)/100 : info.amount;
    included[mid] = true;
  });
  return {
    dateMode: 'manual',
    date: e.date,
    item: e.item,
    category: e.category,
    total: e.total,
    adjustments: (e.adjustments||[]).map(a=>({...a})),
    payerId: e.payerId,
    paymentMethod: e.paymentMethod,
    splitType: e.splitType,
    includedMembers: included,
    customShares,
    items: (e.items||[]).map(it=>({...it, memberIds: [...(it.memberIds||[])]}))
  };
}

// For custom split: customShares holds each person's raw item amount (as it appears on the
// receipt, before any adjustments). For itemized split: items holds receipt line items, each
// shared equally among whichever people were ticked for that particular line — the app works out
// each person's raw total from that automatically. Either way, adjustments are then applied per
// person, so someone who ordered less also carries less of a service charge (or discount).
function computeFinalShares(total, adjustments, splitType, memberIds, customShares, items){
  const multiplier = multiplierForAdjustments(adjustments);
  const shares = {};
  if(splitType==='equal'){
    const n = memberIds.length;
    const per = n ? Math.round((total/n + Number.EPSILON)*100)/100 : 0;
    memberIds.forEach(id=> shares[id] = {amount: per, settled:false});
  } else if(splitType==='items'){
    const raw = rawSharesFromItems(items, memberIds);
    memberIds.forEach(id=>{
      shares[id] = {amount: Math.round(((raw[id]||0)*multiplier + Number.EPSILON)*100)/100, settled:false};
    });
  } else {
    memberIds.forEach(id=>{
      const raw = parseFloat(customShares[id])||0;
      shares[id] = {amount: Math.round((raw*multiplier + Number.EPSILON)*100)/100, settled:false};
    });
  }
  return shares;
}
function customSum(memberIds, customShares){
  return memberIds.reduce((s,id)=> s + (parseFloat(customShares[id])||0), 0);
}
// Splits each item line's amount equally among whichever included members were ticked for it,
// then sums up each person's total across all lines.
function rawSharesFromItems(items, includedIds){
  const raw = {};
  includedIds.forEach(id=> raw[id] = 0);
  (items||[]).forEach(item=>{
    const amt = parseFloat(item.amount)||0;
    const participants = (item.memberIds||[]).filter(id=>includedIds.includes(id));
    if(participants.length===0 || amt===0) return;
    const per = amt/participants.length;
    participants.forEach(id=>{ raw[id] = (raw[id]||0) + per; });
  });
  return raw;
}
function itemsRawSum(items){
  return (items||[]).reduce((s,item)=> s + (parseFloat(item.amount)||0), 0);
}
// What the entered raw amounts (custom per-person entries, or itemized line items) imply the
// total should be, once all adjustments are applied.
function customImpliedTotal(memberIds, customShares, adjustments, splitType, items){
  const multiplier = multiplierForAdjustments(adjustments);
  const rawSum = splitType==='items' ? itemsRawSum(items) : customSum(memberIds, customShares);
  return rawSum * multiplier;
}
function estimatedPreAdjustmentAmount(total, adjustments){
  const multiplier = multiplierForAdjustments(adjustments);
  return multiplier !== 1 ? total / multiplier : null;
}

function rateForExpense(project, e){
  if(sameCurrency(project)) return {rate:1, exact:true};
  if(!project.homeCurrency) return null;
  const exact = findRate(project, e.payerId, e.date, e.paymentMethod);
  if(exact) return {rate: exact.rate, exact:true};
  if(project.exchangeRates.length){
    const avg = project.exchangeRates.reduce((s,r)=>s+r.rate,0) / project.exchangeRates.length;
    return {rate: avg, exact:false};
  }
  return null;
}
function computeBalances(project){
  const bal = {};
  project.members.forEach(m => bal[m.id] = {paidUpfront:0, owed:0, receivable:0, owedHome:0, receivableHome:0, approxHome:false, hasHome:false});
  project.expenses.forEach(e=>{
    if(bal[e.payerId]) bal[e.payerId].paidUpfront += e.total;
    const rateInfo = rateForExpense(project, e);
    Object.entries(e.shares||{}).forEach(([mid, info])=>{
      if(mid === e.payerId) return;
      if(!bal[mid]) return;
      if(!info.settled){
        bal[mid].owed += info.amount;
        if(bal[e.payerId]) bal[e.payerId].receivable += info.amount;
        if(rateInfo){
          const homeAmt = info.amount * rateInfo.rate;
          bal[mid].owedHome += homeAmt;
          bal[mid].hasHome = true;
          if(bal[e.payerId]){ bal[e.payerId].receivableHome += homeAmt; bal[e.payerId].hasHome = true; }
          if(!rateInfo.exact){ bal[mid].approxHome = true; if(bal[e.payerId]) bal[e.payerId].approxHome = true; }
        }
      }
    });
  });
  return bal;
}
function computeSettlement(project){
  const balances = computeBalances(project);
  const nets = project.members.map(m=>({
    id:m.id, name:m.name,
    net: (balances[m.id].receivable||0) - (balances[m.id].owed||0),
    netHome: (balances[m.id].receivableHome||0) - (balances[m.id].owedHome||0),
    hasHome: balances[m.id].hasHome, approxHome: balances[m.id].approxHome
  }));
  const creditors = nets.filter(n=>n.net>0.005).map(n=>({...n})).sort((a,b)=>b.net-a.net);
  const debtors = nets.filter(n=>n.net<-0.005).map(n=>({...n, net:-n.net, netHome:-n.netHome})).sort((a,b)=>b.net-a.net);
  const transactions = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].net, creditors[j].net);
    if(pay > 0.005){
      // Split this trip-currency payment proportionally using the debtor's own blended
      // home-currency rate (their actual recorded conversions), not one global average.
      const debtorRate = debtors[i].net > 0.005 ? debtors[i].netHome / debtors[i].net : null;
      transactions.push({
        from:debtors[i].name, to:creditors[j].name, amount:pay,
        homeAmount: debtorRate!==null ? pay*debtorRate : null,
        approxHome: debtors[i].approxHome, hasHome: debtors[i].hasHome
      });
      if(debtorRate!==null) debtors[i].netHome -= pay*debtorRate;
    }
    debtors[i].net -= pay;
    creditors[j].net -= pay;
    if(debtors[i].net <= 0.005) i++;
    if(creditors[j].net <= 0.005) j++;
  }
  return transactions;
}
function categoryTotals(project){
  const totals = {};
  project.expenses.forEach(e=>{ totals[e.category] = (totals[e.category]||0) + e.total; });
  return totals;
}
function findRate(project, payerId, date, paymentMethod){
  return project.exchangeRates.find(r => r.payerId===payerId && r.date===date && r.paymentMethod===paymentMethod);
}

function render(){
  const app = document.getElementById('app');
  let html = renderHeader();

  if(!state.currentProject){
    html += renderEmptyState();
    app.innerHTML = html;
    attachHeaderEvents(); attachEmptyStateEvents();
    return;
  }

  if(!state.draft && state.activeTab==='add'){
    state.draft = state.editingExpenseId
      ? draftFromExpense(state.currentProject.expenses.find(e=>e.id===state.editingExpenseId))
      : freshDraft();
  }

  html += renderTabs();
  html += '<div id="tabContent">' + renderTabContent() + '</div>';
  app.innerHTML = html;
  attachHeaderEvents(); attachTabEvents(); attachContentEvents();
}

function renderHeader(){
  const opts = state.projects.map(p => `<option value="${p.id}" ${p.id===state.currentProjectId?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
  return `
  <header class="top">
    <div class="brand"><div class="mark">$</div><h1>Trip Split</h1></div>
    <div class="row">
      ${state.projects.length ? `<select id="projectSelect">${opts}</select>` : ''}
      <button class="btn secondary small" id="newProjectBtn">New trip</button>
    </div>

}

function renderEmptyState(){
  return `

    <div class="row" style="justify-content:center;">
      <button class="btn" id="emptyNewProjectBtn">Create a new trip</button>

function renderTabs(){

    </div>`;

    rateBanner = rateInfo
      ? `<div class="banner success">Rate on file for this payer/date/method: 1${curSym()} = ${rateInfo.rate} ${homeSym()}. Estimated: ${homeSym()}${fmt(totalNum*rateInfo.rate)}</div>`
      : `<div class="banner warn">No exchange rate yet for this payer on ${resolvedDate} via ${escapeHtml(d.paymentMethod)}. You can add it later in Settings once you know it.</div>`;

function renderExpensesTab(p){
  if(p.expenses.length===0) return `<div class="card"><p class="empty-hint">No expenses logged yet.</p></div>`;
  const memberName = id => (p.members.find(m=>m.id===id)||{}).name || '—';
  const f = state.expenseFilters;

  const catOpts = p.categories.map(c=>`<option value="${escapeHtml(c)}" ${f.category===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
  const payerOpts = p.members.map(m=>`<option value="${m.id}" ${f.payerId===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('');

  const filterBar = `
  <div class="card filter-bar">
    <div class="filter-row">
      <div class="filter-field">
        <label>Date</label>
        <input type="date" id="filterDate" value="${f.date}">
      </div>
      <div class="filter-field">
        <label>Category</label>
        <select id="filterCategory"><option value="" ${!f.category?'selected':''}>All categories</option>${catOpts}</select>
      </div>
      <div class="filter-field">
        <label>Paid by</label>
        <select id="filterPayer"><option value="" ${!f.payerId?'selected':''}>Anyone</option>${payerOpts}</select>
      </div>
      <div class="filter-field">
        <label>Status</label>
        <select id="filterStatus">
          <option value="" ${!f.status?'selected':''}>All</option>
          <option value="unpaid" ${f.status==='unpaid'?'selected':''}>Unpaid only</option>
        </select>
      </div>
      <button type="button" class="btn secondary small" id="clearExpenseFiltersBtn">Clear filters</button>
    </div>
  </div>`;

  const filtered = p.expenses.filter(e=>{
    if(f.date && e.date !== f.date) return false;
    if(f.category && e.category !== f.category) return false;
    if(f.payerId && e.payerId !== f.payerId) return false;
    if(f.status === 'unpaid'){
      const hasUnpaid = Object.entries(e.shares||{}).some(([mid,info])=> mid!==e.payerId && !info.settled);
      if(!hasUnpaid) return false;
    }
    return true;
  });

  if(filtered.length===0){
    return filterBar + `<div class="card"><p class="empty-hint">No expenses match these filters.</p></div>`;
  }

  const sorted = [...filtered].sort((a,b)=> b.date.localeCompare(a.date));

  const cards = sorted.map(e=>{
    const payerName = memberName(e.payerId);
    const includedIds = Object.keys(e.shares||{});
    const adjBadge = (e.adjustments||[]).map(a=>
      `<span class="badge ${a.sign==='-'?'taxfree':'service'}">${a.sign==='-'?'−':'+'}${fmt(a.percent)}%${a.label?' '+escapeHtml(a.label):''}</span>`
    ).join(' ');
    const methodBadge = `<span class="badge method">${escapeHtml(e.paymentMethod)}</span>`;
    let rateBadge = '';
    if(needsConversion(p)){
      const r = findRate(p, e.payerId, e.date, e.paymentMethod);
      rateBadge = r
        ? `<span class="badge service">≈ ${homeSym()}${fmt(e.total*r.rate)}</span>`
        : `<span class="badge pending">Rate pending</span>`;
    }
    const shareBreakdown = includedIds.map(mid=>{
      const amt = e.shares[mid].amount;
      const label = mid===e.payerId ? `${escapeHtml(memberName(mid))} (paid)` : escapeHtml(memberName(mid));
      return `${label}: ${curSym()}${fmt(amt)}`;
    }).join(' · ');
    const paidBackHtml = includedIds.filter(mid=>mid!==e.payerId).map(mid=>{
      const info = e.shares[mid];
      return `
      <label class="paid-back-item">
        <input type="checkbox" data-settle-expense="${e.id}" data-settle-member="${mid}" ${info.settled?'checked':''}>
        ${escapeHtml(memberName(mid))} paid back
      </label>`;
    }).join('');

    return `
    <div class="expense-card">
      <div class="expense-card-top">
        <div>
          <div class="expense-card-title">${escapeHtml(e.item)}</div>
          <div class="expense-card-date">${e.date}</div>
        </div>
        <div class="expense-card-amount">${curSym()}${fmt(e.total)}</div>
      </div>
      <div class="expense-card-meta">
        <span class="cat-pill">${escapeHtml(e.category)}</span>
        ${adjBadge} ${methodBadge} ${rateBadge}
        <span>Paid by <b>${escapeHtml(payerName)}</b></span>
        <span>· ${e.splitType==='equal'?'Equal split':e.splitType==='items'?'Itemized split':'Custom split'}</span>
        <span style="display:block;width:100%;color:var(--text-muted);margin-top:2px;">${shareBreakdown}</span>

        <button class="icon-btn" data-edit-expense="${e.id}">Edit</button>
        <button class="icon-btn" data-delete-expense="${e.id}">Delete</button>
      </div>
    </div>`;
  }).join('');

  return filterBar + `<div class="hint" style="margin:0 0 10px;">Showing ${filtered.length} of ${p.expenses.length} expenses</div><div>${cards}</div>`;
}

function renderSummaryTab(p){
  if(p.expenses.length===0) return `<div class="card"><p class="empty-hint">Add some expenses to see the summary.</p></div>`;

  const f = state.summaryFilters;
  const catOptsS = p.categories.map(c=>`<option value="${escapeHtml(c)}" ${f.category===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
  const filterBar = `
  <div class="card filter-bar">
    <div class="filter-row">
      <div class="filter-field"><label>Date</label><input type="date" id="summaryFilterDate" value="${f.date}"></div>
      <div class="filter-field"><label>Category</label><select id="summaryFilterCategory"><option value="" ${!f.category?'selected':''}>All categories</option>${catOptsS}</select></div>
      <button type="button" class="btn secondary small" id="clearSummaryFiltersBtn">Clear filters</button>
    </div>
  </div>`;

  const filteredExpenses = p.expenses.filter(e=>{
    if(f.date && e.date !== f.date) return false;
    if(f.category && e.category !== f.category) return false;
    return true;
  });

  if(filteredExpenses.length === 0){
    return filterBar + `<div class="card"><p class="empty-hint">No expenses match these filters.</p></div>`;
  }

  const view = Object.assign({}, p, {expenses: filteredExpenses});
  const balances = computeBalances(view);
  const total = filteredExpenses.reduce((s,e)=>s+e.total,0);
  const settlement = computeSettlement(view);
  const catTotals = categoryTotals(view);
  const showHome = needsConversion(p) || sameCurrency(p);

  const pendingRates = needsConversion(p) ? filteredExpenses.filter(e => !findRate(p, e.payerId, e.date, e.paymentMethod)) : [];
  const anyExactOrApprox = showHome && p.members.some(m => balances[m.id].hasHome);
  const filterNote = (f.date || f.category) ? `<div class="hint" style="margin:-4px 0 14px;">Showing ${filteredExpenses.length} of ${p.expenses.length} expenses</div>` : '';

  const balanceCards = p.members.map(m=>{
    const b = balances[m.id];
    const net = (b.receivable||0) - (b.owed||0);
    const cls = net > 0.005 ? 'positive' : (net < -0.005 ? 'negative' : 'zero');
    const label = net > 0.005 ? `should receive ${curSym()}${fmt(net)}` : (net < -0.005 ? `owes ${curSym()}${fmt(-net)}` : 'settled up');
    const netHome = (b.receivableHome||0) - (b.owedHome||0);
    const homeLine = showHome && b.hasHome && Math.abs(net) > 0.005 ? `<span class="home">${b.approxHome?'≈ ':''}${homeSym()}${fmt(Math.abs(netHome))}</span>` : '';
    return `
    <div class="balance-card">
      <span class="balance-name"><span class="avatar">${escapeHtml(initials(m.name))}</span>${escapeHtml(m.name)}</span>
      <span class="balance-amt ${cls}">${label}${homeLine}</span>
    </div>`;
  }).join('');

  const settlementHtml = settlement.length
    ? settlement.map(t=>`
      <div class="settlement-item">
        <span><b>${escapeHtml(t.from)}</b> pays <b>${escapeHtml(t.to)}</b> ${curSym()}${fmt(t.amount)}</span>
        ${showHome && t.hasHome && t.homeAmount!==null ? `<span class="home-amt">${t.approxHome?'≈ ':''}${homeSym()}${fmt(t.homeAmount)}</span>` : ''}
      </div>`).join('')
    : `<div class="empty-hint">Everyone is settled up.</div>`;

  const convNote = anyExactOrApprox && !sameCurrency(p)
    ? `<p style="font-size:12px;color:var(--text-muted);margin-top:10px;">${homeSym()} figures use the exact rate recorded for each payer/date/method where available, and fall back to an average of your recorded rates only where an exact match is missing (marked ≈).</p>`
    : '';

  const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const legend = catEntries.map(([cat,amt],i)=>{
    const pct = total ? Math.round(amt/total*1000)/10 : 0;
    return `<span><i style="background:${CATEGORY_COLORS[i%CATEGORY_COLORS.length]}"></i>${escapeHtml(cat)} ${curSym()}${fmt(amt)} (${pct}%)</span>`;
  }).join('');

  const pendingHtml = pendingRates.length ? `
  <div class="card">
    <h3 style="margin-bottom:10px;">Expenses awaiting an exchange rate</h3>
    ${pendingRates.map(e=>`<div class="settlement-item"><span>${e.date} · ${escapeHtml(e.item)} · ${escapeHtml(e.paymentMethod)}</span><span>${curSym()}${fmt(e.total)}</span></div>`).join('')}
    <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">Add these rates in Settings — until then, amounts affecting these expenses use an average of your recorded rates.</p>
  </div>` : '';

  return filterBar + filterNote + `
  <div class="stat-grid">
    <div class="stat-card"><div class="label">Total spent</div><div class="value">${curSym()}${fmt(total)}</div></div>
    <div class="stat-card"><div class="label">Expenses logged</div><div class="value">${filteredExpenses.length}</div></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;">Who owes what</h3>
    ${balanceCards}
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;">Suggested settlements</h3>
    ${settlementHtml}
    ${convNote}
  </div>
  ${pendingHtml}
  <div class="card">    <h3 style="margin-bottom:4px;">Spending by category</h3>
    <div class="legend">${legend}</div>
    <div style="max-width:260px;margin:10px auto 0;">${buildCategoryPieSVG(catEntries)}</div>
  </div>`;
}

// Self-contained SVG pie chart — no external chart library or network request needed, so this
// keeps working with zero internet connection (important for the local/offline version).
function buildCategoryPieSVG(entries){
  const total = entries.reduce((s,[,v])=>s+v, 0);
  if(total <= 0) return '';
  if(entries.length === 1){
    return `<svg viewBox="0 0 200 200" style="width:100%;height:auto;"><circle cx="100" cy="100" r="90" fill="${CATEGORY_COLORS[0]}"/></svg>`;
  }
  const polar = (cx,cy,r,angleDeg)=>{
    const rad = (angleDeg-90) * Math.PI/180;
    return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
  };
  let cumulative = 0;
  const cx=100, cy=100, r=90;
  const slices = entries.map(([label,val],i)=>{
    const startAngle = cumulative/total*360;
    cumulative += val;
    const endAngle = cumulative/total*360;
    const start = polar(cx,cy,r,endAngle);
    const end = polar(cx,cy,r,startAngle);
    const largeArc = (endAngle-startAngle) > 180 ? 1 : 0;
    const path = `M ${cx} ${cy} L ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} 0 ${end.x.toFixed(2)} ${end.y.toFixed(2)} Z`;
    return `<path d="${path}" fill="${CATEGORY_COLORS[i%CATEGORY_COLORS.length]}"><title>${escapeHtml(label)}</title></path>`;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="width:100%;height:auto;">${slices}</svg>`;
}

function updatePreAdjHint(){

function updateRemainingDisplay(){
  const d = state.draft;
  if(d.splitType !== 'custom' && d.splitType !== 'items') return;
  const p = state.currentProject;
  const total = parseFloat(d.total) || 0;
  const includedIds = p.members.map(m=>m.id).filter(id => d.includedMembers[id] !== false);
  const implied = customImpliedTotal(includedIds, d.customShares, d.adjustments, d.splitType, d.items);
  const remaining = Math.round((total - implied + Number.EPSILON)*100)/100;
  const el = document.getElementById('splitRemaining');
  if(el){
    el.textContent = 'Remaining: ' + curSym() + fmt(remaining);
    el.style.color = Math.abs(remaining) < 0.005 ? 'var(--success)' : 'var(--error)';
  }
  const balanceBtn = document.getElementById('autoBalanceBtn');
  if(balanceBtn){
    const rawSum = d.splitType==='items' ? itemsRawSum(d.items) : customSum(includedIds, d.customShares);
    balanceBtn.style.display = (Math.abs(remaining) >= 0.005 && rawSum > 0 && total > 0) ? 'inline-block' : 'none';
  }
}

// Solves for the exact percentage the last adjustment row needs (adding one first if there
// isn't one yet) so that the entered item amounts, once adjusted, land exactly on the entered
// total — instead of the person hand-calculating a precise percentage by trial and error.
function autoBalanceAdjustment(){
  const d = state.draft;
  const p = state.currentProject;
  const total = parseFloat(d.total) || 0;
  const includedIds = p.members.map(m=>m.id).filter(id => d.includedMembers[id] !== false);
  const rawSum = d.splitType==='items' ? itemsRawSum(d.items) : customSum(includedIds, d.customShares);
  if(rawSum <= 0 || total <= 0) return;

  const targetMultiplier = total / rawSum;
  const otherAdjustments = d.adjustments.length ? d.adjustments.slice(0, -1) : [];
  const otherMultiplier = multiplierForAdjustments(otherAdjustments);
  if(otherMultiplier === 0) return;
  const contribution = targetMultiplier / otherMultiplier;

  const sign = contribution >= 1 ? '+' : '-';
  const percentRaw = sign === '+' ? (contribution - 1) * 100 : (1 - contribution) * 100;
  const percent = Math.round(percentRaw * 10000) / 10000;

  if(d.adjustments.length === 0){
    d.adjustments.push({id: uid(), sign, percent, label: ''});
  } else {
    const last = d.adjustments[d.adjustments.length - 1];
    last.sign = sign;
    last.percent = percent;
  }
  render();
}

async function onSaveExpense(){
  const p = state.currentProject;
  const d = state.draft;
  state.formError = '';

  const date = d.dateMode === 'auto' ? todayStr() : (d.date || todayStr());
  const item = (d.item||'').trim();
  const category = d.category;
  const total = parseFloat(d.total);
  const payerId = d.payerId;

  if(!item){ state.formError = 'Enter an item name.'; render(); return; }
  if(!total || total <= 0){ state.formError = 'Enter a total amount greater than 0.'; render(); return; }
  if(!payerId){ state.formError = 'Choose who paid.'; render(); return; }
  const badAdjustment = d.adjustments.find(a => !a.percent || parseFloat(a.percent) <= 0);
  if(badAdjustment){
    state.formError = 'Enter a percentage for each adjustment, or remove the empty one.'; render(); return;
  }

  const memberIds = p.members.map(m=>m.id).filter(id => d.includedMembers[id] !== false);
  if(memberIds.length === 0){
    state.formError = 'Select at least one person this expense applies to.'; render(); return;
  }
  if(d.splitType === 'items'){
    const emptyItem = d.items.find(it => !it.amount || parseFloat(it.amount) <= 0 || !(it.memberIds||[]).length);
    if(d.items.length === 0){
      state.formError = 'Add at least one item line, or switch to Equal / Custom split.'; render(); return;
    }
    if(emptyItem){
      state.formError = 'Every item needs an amount and at least one person selected.'; render(); return;
    }
  }
  if(d.splitType === 'custom' || d.splitType === 'items'){
    const implied = customImpliedTotal(memberIds, d.customShares, d.adjustments, d.splitType, d.items);
    const diff = Math.round((total - implied + Number.EPSILON)*100)/100;
    if(Math.abs(diff) >= 0.01){
      state.formError = `The item amounts you entered${d.adjustments.length ? ' (after applying the adjustments)' : ''} don't add up to the total. Off by ${curSym()}${fmt(Math.abs(diff))}. Please adjust before saving.`;
      render(); return;
    }
  }

  const shares = computeFinalShares(total, d.adjustments, d.splitType, memberIds, d.customShares, d.items);

  if(state.editingExpenseId){
    const existing = p.expenses.find(e=>e.id===state.editingExpenseId);
    Object.keys(shares).forEach(mid=>{ if(existing.shares[mid]) shares[mid].settled = existing.shares[mid].settled; });
  }

  const expenseData = {
    id: state.editingExpenseId || uid(),
    date, item, category, total, payerId,
    adjustments: d.adjustments.map(a=>({id:a.id, sign:a.sign, percent: parseFloat(a.percent)||0, label:a.label||''})),
    paymentMethod: d.paymentMethod, splitType: d.splitType,
    items: d.splitType==='items' ? d.items.map(it=>({id:it.id, name:it.name||'', amount: parseFloat(it.amount)||0, memberIds:[...(it.memberIds||[])]})) : undefined,
    shares
  };

  if(state.editingExpenseId){
    const idx = p.expenses.findIndex(e=>e.id===state.editingExpenseId);
    if(idx>=0) p.expenses[idx] = expenseData;
  } else {
    p.expenses.push(expenseData);
  }

  await saveCurrentProject();
  state.editingExpenseId = null;
  state.draft = null;
  state.formError = '';
  render();
}

  const filterDate = document.getElementById('filterDate');
  if(filterDate) filterDate.addEventListener('change', ()=>{ state.expenseFilters.date = filterDate.value; render(); });
  const filterCategory = document.getElementById('filterCategory');
  if(filterCategory) filterCategory.addEventListener('change', ()=>{ state.expenseFilters.category = filterCategory.value; render(); });
  const filterPayer = document.getElementById('filterPayer');
  if(filterPayer) filterPayer.addEventListener('change', ()=>{ state.expenseFilters.payerId = filterPayer.value; render(); });
  const filterStatus = document.getElementById('filterStatus');
  if(filterStatus) filterStatus.addEventListener('change', ()=>{ state.expenseFilters.status = filterStatus.value; render(); });
  const clearBtn = document.getElementById('clearExpenseFiltersBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{
    state.expenseFilters = { date:'', category:'', payerId:'', status:'' };
    render();
  });

  document.querySelectorAll('[data-edit-expense]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const e = p.expenses.find(x=>x.id===btn.dataset.editExpense);
      if(!e) return;
      state.editingExpenseId = e.id;
      state.draft = draftFromExpense(e);
      state.activeTab = 'add';
      state.formError = '';
      render();
    });
  });
  document.querySelectorAll('[data-delete-expense]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      showConfirmModal('Delete this expense?', async ()=>{
        p.expenses = p.expenses.filter(x=>x.id!==btn.dataset.deleteExpense);
        await saveCurrentProject();
        render();
      });
    });
  });
  document.querySelectorAll('[data-settle-expense]').forEach(cb=>{
    cb.addEventListener('change', async ()=>{
      const e = p.expenses.find(x=>x.id===cb.dataset.settleExpense);
      if(!e) return;
      const mid = cb.dataset.settleMember;
      if(e.shares[mid]) e.shares[mid].settled = cb.checked;
      await saveCurrentProject();
      render();
    });
  });
}

function attachSettingsEvents(p){
  const curInput = document.getElementById('currencyInput');
  if(curInput) curInput.addEventListener('change', async ()=>{ p.currency = curInput.value.trim() || '₩'; await saveCurrentProject(); render(); });
  const homeInput = document.getElementById('homeCurrencyInput');
  if(homeInput) homeInput.addEventListener('change', async ()=>{ p.homeCurrency = homeInput.value.trim(); await saveCurrentProject(); render(); });

  const addCatBtn = document.getElementById('addCategoryBtn');
  const newCatInput = document.getElementById('newCategoryInput');
  const doAddCat = async ()=>{
    const name = newCatInput.value.trim();
    if(!name || p.categories.includes(name)) return;
    p.categories.push(name); await saveCurrentProject(); render();
  };
  if(addCatBtn) addCatBtn.addEventListener('click', doAddCat);
  if(newCatInput) newCatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddCat(); });
  document.querySelectorAll('[data-remove-cat]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const cat = btn.dataset.removeCat;
      const inUse = p.expenses.some(e=>e.category===cat);
      const doRemove = async ()=>{ p.categories = p.categories.filter(c=>c!==cat); await saveCurrentProject(); render(); };
      if(inUse) showConfirmModal(`"${cat}" is used by existing expenses. Remove it from the list anyway?`, doRemove);
      else doRemove();
    });
  });

  const addMethodBtn = document.getElementById('addMethodBtn');
  const newMethodInput = document.getElementById('newMethodInput');
  const doAddMethod = async ()=>{
    const name = newMethodInput.value.trim();
    if(!name || p.paymentMethods.includes(name)) return;
    p.paymentMethods.push(name); await saveCurrentProject(); render();
  };
  if(addMethodBtn) addMethodBtn.addEventListener('click', doAddMethod);
  if(newMethodInput) newMethodInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddMethod(); });
  document.querySelectorAll('[data-remove-method]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const method = btn.dataset.removeMethod;
      const inUse = p.expenses.some(e=>e.paymentMethod===method);
      const doRemove = async ()=>{ p.paymentMethods = p.paymentMethods.filter(c=>c!==method); await saveCurrentProject(); render(); };
      if(inUse) showConfirmModal(`"${method}" is used by existing expenses. Remove it from the list anyway?`, doRemove);
      else doRemove();
    });
  });

  const addRateBtn = document.getElementById('addRateBtn');
  if(addRateBtn) addRateBtn.addEventListener('click', async ()=>{
    const date = document.getElementById('rateDate').value;
    const payerId = document.getElementById('ratePayer').value;
    const paymentMethod = document.getElementById('ratePaymentMethod').value;
    const rate = parseFloat(document.getElementById('rateValue').value);
    if(!date || !payerId || !rate || rate<=0) return;
    p.exchangeRates = p.exchangeRates.filter(r => !(r.date===date && r.payerId===payerId && r.paymentMethod===paymentMethod));
    p.exchangeRates.push({id:uid(), date, payerId, paymentMethod, rate});
    await saveCurrentProject();
    render();
  });
  document.querySelectorAll('[data-remove-rate]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      p.exchangeRates = p.exchangeRates.filter(r=>r.id!==btn.dataset.removeRate);
      await saveCurrentProject();
      render();
    });
  });

  const deleteTripBtn = document.getElementById('deleteTripBtn');
  if(deleteTripBtn) deleteTripBtn.addEventListener('click', ()=> showDeleteTripModal(p));

  const exportJsonBtn = document.getElementById('exportJsonBtn');
  if(exportJsonBtn) exportJsonBtn.addEventListener('click', ()=> exportProjectJSON(p));

  const importJsonBtn = document.getElementById('importJsonBtn');
  const importJsonFile = document.getElementById('importJsonFile');
  if(importJsonBtn && importJsonFile){
    importJsonBtn.addEventListener('click', ()=> importJsonFile.click());
    importJsonFile.addEventListener('change', async ()=>{
      const file = importJsonFile.files[0];
      importJsonFile.value = '';
      if(file) await importProjectFromFile(file);
    });
  }

  const exportExcelBtn = document.getElementById('exportExcelBtn');
  if(exportExcelBtn) exportExcelBtn.addEventListener('click', ()=> exportProjectExcel(p));
}

function showExportImportMessage(text, isError){
  const el = document.getElementById('exportImportMsg');
  if(!el) return;
  el.innerHTML = `<div class="banner ${isError?'error':'success'}" style="margin-top:12px;">${escapeHtml(text)}</div>`;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
}

function exportProjectJSON(p){
  const payload = { app: 'trip-split', exportVersion: 1, project: p };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const safeName = p.name.replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  downloadBlob(blob, `tripsplit-${safeName}-${todayStr()}.json`);
  showExportImportMessage('Exported. Send this file to a friend so they can import it.', false);
}

async function importProjectFromFile(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || data.app !== 'trip-split' || !data.project){
      showExportImportMessage("This doesn't look like a Trip Split export file.", true);
      return;
    }
    const imported = normalizeProject(data.project);
    const existingLocally = state.projects.find(p=>p.id===imported.id);
    const doImport = async ()=>{
      state.currentProject = imported;
      state.currentProjectId = imported.id;
      await saveCurrentProject();
      if(!existingLocally){
        state.projects.push({id: imported.id, name: imported.name});
        await saveProjects();
      } else {
        existingLocally.name = imported.name;
        await saveProjects();
      }
      state.activeTab = 'summary';
      state.draft = null;
      render();
    };
    if(existingLocally){
      showConfirmModal(`A trip called "${existingLocally.name}" already exists on this device with this same Trip ID. Importing will overwrite it with the version from this file. Continue?`, doImport);
    } else {
      await doImport();
    }
  }catch(e){
    showExportImportMessage('Could not read that file — make sure it\u2019s a .json file exported from Trip Split.', true);
  }
}

function exportProjectExcel(p){
  if(typeof XLSX === 'undefined'){
    showExportImportMessage('The Excel export tool needs an internet connection to load the first time. Connect to the internet and try again.', true);
    return;
  }
  const memberName = id => (p.members.find(m=>m.id===id)||{}).name || '—';
  const balances = computeBalances(p);
  const settlement = computeSettlement(p);
  const catTotals = categoryTotals(p);

  const expenseRows = [['Date','Item','Category','Total','Adjustments','Paid by','Payment method','Split','Shares (name: amount, paid back?)']];
  [...p.expenses].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    const adj = (e.adjustments||[]).map(a=>`${a.sign}${a.percent}%${a.label?' '+a.label:''}`).join(', ');
    const shares = Object.entries(e.shares||{}).map(([mid,info])=>`${memberName(mid)}: ${fmt(info.amount)}${info.settled?' (paid back)':''}`).join('; ');
    expenseRows.push([e.date, e.item, e.category, e.total, adj, memberName(e.payerId), e.paymentMethod, e.splitType, shares]);
  });

  const summaryRows = [['Member','Paid upfront','Owed','Net balance','Status']];
  p.members.forEach(m=>{
    const b = balances[m.id];
    const net = (b.receivable||0) - (b.owed||0);
    const status = net > 0.005 ? 'Should receive' : (net < -0.005 ? 'Owes' : 'Settled up');
    summaryRows.push([m.name, fmt(b.paidUpfront), fmt(b.owed), fmt(net), status]);
  });
  summaryRows.push([]);
  summaryRows.push(['Suggested settlements']);
  if(settlement.length){
    settlement.forEach(t=> summaryRows.push([`${t.from} pays ${t.to}`, fmt(t.amount)]));
  } else {
    summaryRows.push(['Everyone is settled up']);
  }

  const catRows = [['Category','Total','% of total']];
  const total = p.expenses.reduce((s,e)=>s+e.total,0);
  Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{
    catRows.push([cat, fmt(amt), total ? Math.round(amt/total*1000)/10 + '%' : '0%']);
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(expenseRows), 'Expenses');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), 'Summary');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(catRows), 'Categories');
  const safeName = p.name.replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  XLSX.writeFile(wb, `tripsplit-${safeName}-${todayStr()}.xlsx`);
  showExportImportMessage('Excel report downloaded.', false);
}

function showInputModal(title, placeholder, onConfirm){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${escapeHtml(title)}</h3>
      <input type="text" id="modalInput" placeholder="${escapeHtml(placeholder)}" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;">
      <div class="row" style="justify-content:flex-end;">
        <button class="btn secondary" id="modalCancel">Cancel</button>
        <button class="btn" id="modalOk">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#modalInput');
  input.focus();
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmAction(); });
  function confirmAction(){ const val = input.value; document.body.removeChild(overlay); onConfirm(val); }
  overlay.querySelector('#modalOk').addEventListener('click', confirmAction);
  overlay.querySelector('#modalCancel').addEventListener('click', ()=> document.body.removeChild(overlay));
}



function showConfirmModal(message, onConfirm){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Are you sure?</h3>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">${escapeHtml(message)}</p>
      <div class="row" style="justify-content:flex-end;">
        <button class="btn secondary" id="modalCancel">Cancel</button>
        <button class="btn" id="modalOk" style="background:var(--error);border-color:var(--error);">Confirm</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modalOk').addEventListener('click', async ()=>{ document.body.removeChild(overlay); await onConfirm(); });
  overlay.querySelector('#modalCancel').addEventListener('click', ()=> document.body.removeChild(overlay));
}

function showDeleteTripModal(project){
  showConfirmModal(
    `This permanently deletes "${project.name}" — every expense, member, and setting on this device. This cannot be undone. Continue?`,
    ()=> showTypeToConfirmDeleteModal(project)
  );
}

function showTypeToConfirmDeleteModal(project){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3 style="color:var(--error);">Last check</h3>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">To confirm, type the trip's name exactly as shown, then delete it.</p>
      <p style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;">${escapeHtml(project.name)}</p>
      <input type="text" id="confirmNameInput" placeholder="Type the trip name here" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;">
      <div class="row" style="justify-content:flex-end;">
        <button class="btn secondary" id="confirmCancel">Cancel</button>
        <button class="btn danger-solid" id="confirmDelete" disabled style="opacity:0.5;cursor:not-allowed;">Delete permanently</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#confirmNameInput');
  const deleteBtn = overlay.querySelector('#confirmDelete');
  input.focus();
  input.addEventListener('input', ()=>{
    const match = input.value.trim() === project.name.trim();
    deleteBtn.disabled = !match;
    deleteBtn.style.opacity = match ? '1' : '0.5';
    deleteBtn.style.cursor = match ? 'pointer' : 'not-allowed';
  });
  deleteBtn.addEventListener('click', async ()=>{
    if(input.value.trim() !== project.name.trim()) return;
    document.body.removeChild(overlay);
    await deleteProjectPermanently(project.id);
  });
  overlay.querySelector('#confirmCancel').addEventListener('click', ()=> document.body.removeChild(overlay));
}

async function init(){
  await loadProjects();
  if(state.projects.length) await loadProject(state.projects[0].id);
  render();
}
init();
})();
</script>
